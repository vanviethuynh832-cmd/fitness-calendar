<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>健身打卡日历</title>
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="健身日历" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --panel-soft: #151515;
        --line: #262626;
        --line-strong: #3a3a3a;
        --text: #f4f4f4;
        --muted: #929292;
        --accent: #f5c542;
        --strength: #ff6b6b;
        --cardio: #4dd4ac;
        --shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 220px),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 34px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .month-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 16, 16, 0.86);
      }

      .icon-button,
      .today-button,
      .primary-button,
      .ghost-button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #171717;
        color: var(--text);
      }

      .icon-button {
        width: 40px;
        display: grid;
        place-items: center;
        font-size: 21px;
      }

      .today-button,
      .primary-button,
      .ghost-button {
        padding: 0 15px;
      }

      .today-button:hover,
      .icon-button:hover,
      .ghost-button:hover {
        border-color: var(--line-strong);
        background: #1d1d1d;
      }

      .primary-button {
        border-color: rgba(245, 197, 66, 0.5);
        background: var(--accent);
        color: #090909;
        font-weight: 800;
      }

      .month-label {
        min-width: 122px;
        text-align: center;
        font-size: 17px;
        font-weight: 800;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 18px;
        align-items: start;
      }

      .calendar-shell,
      .side-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(13, 13, 13, 0.92);
        box-shadow: var(--shadow);
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekdays {
        border-bottom: 1px solid var(--line);
      }

      .weekday {
        padding: 14px 10px;
        color: var(--muted);
        text-align: center;
        font-size: 13px;
        font-weight: 700;
      }

      .day {
        min-height: 126px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: #0c0c0c;
        padding: 10px;
        text-align: left;
        color: var(--text);
        transition:
          background 140ms ease,
          border-color 140ms ease,
          transform 140ms ease;
      }

      .day:nth-child(7n) {
        border-right: 0;
      }

      .day:nth-last-child(-n + 7) {
        border-bottom: 0;
      }

      .day:hover {
        background: #141414;
        border-color: var(--line-strong);
      }

      .day.is-muted {
        color: #565656;
        background: #090909;
      }

      .day.is-selected {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
        background: #171409;
      }

      .day.is-today .date-number {
        background: var(--text);
        color: #090909;
      }

      .date-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 10px;
      }

      .date-number {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        font-weight: 850;
      }

      .activity-count {
        color: var(--muted);
        font-size: 12px;
      }

      .day-icons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mini-icon {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #151515;
        font-size: 16px;
      }

      .mini-icon svg {
        width: 18px;
        height: 18px;
      }

      .side-panel {
        padding: 18px;
        position: sticky;
        top: 18px;
      }

      .panel-date {
        margin: 0 0 4px;
        font-size: 24px;
      }

      .panel-meta {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .section-title {
        margin: 18px 0 10px;
        color: #d8d8d8;
        font-size: 13px;
        font-weight: 850;
      }

      .activity-list {
        display: grid;
        gap: 9px;
      }

      .activity-option {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
      }

      .activity-option:hover {
        border-color: var(--line-strong);
        background: #181818;
      }

      .activity-option.is-added {
        border-color: rgba(245, 197, 66, 0.65);
        background: #1d1809;
      }

      .activity-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        font-size: 21px;
      }

      .activity-icon svg {
        width: 24px;
        height: 24px;
      }

      .activity-name {
        font-weight: 800;
      }

      .activity-type {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .tag {
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.strength {
        color: var(--strength);
        background: rgba(255, 107, 107, 0.12);
      }

      .tag.cardio {
        color: var(--cardio);
        background: rgba(77, 212, 172, 0.12);
      }

      .selected-list {
        display: grid;
        gap: 8px;
        margin: 10px 0 0;
      }

      .selected-item {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) 34px;
        align-items: center;
        gap: 9px;
        min-height: 44px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111;
      }

      .remove-button {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        font-size: 20px;
      }

      .remove-button:hover {
        background: #211;
        color: #ff8a8a;
      }

      .note-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 10px;
      }

      .note-input {
        min-height: 40px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d0d0d;
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }

      .note-input:focus {
        border-color: var(--accent);
      }

      .empty {
        padding: 14px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
        background: #0d0d0d;
      }

      @media (max-width: 900px) {
        .topbar,
        .layout {
          grid-template-columns: 1fr;
        }

        .topbar {
          display: grid;
          align-items: start;
        }

        .month-controls {
          justify-content: space-between;
          width: 100%;
        }

        .side-panel {
          position: static;
        }
      }

      @media (max-width: 640px) {
        .app {
          width: min(100vw - 20px, 1180px);
          padding-top: 22px;
        }

        .weekday {
          padding: 10px 2px;
          font-size: 12px;
        }

        .day {
          min-height: 82px;
          padding: 6px;
        }

        .date-number {
          width: 24px;
          height: 24px;
          font-size: 13px;
        }

        .activity-count {
          display: none;
        }

        .mini-icon {
          width: 24px;
          height: 24px;
          border-radius: 7px;
          font-size: 14px;
        }

        .activity-option {
          grid-template-columns: 40px minmax(0, 1fr);
        }

        .activity-option .tag {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>健身打卡日历</h1>
          <p class="subtitle">选择日期，给当天添加训练或有氧活动。</p>
        </div>
        <div class="month-controls" aria-label="月份切换">
          <button class="icon-button" id="prevMonth" type="button" title="上个月" aria-label="上个月">‹</button>
          <div class="month-label" id="monthLabel"></div>
          <button class="icon-button" id="nextMonth" type="button" title="下个月" aria-label="下个月">›</button>
          <button class="today-button" id="todayButton" type="button">今天</button>
        </div>
      </header>

      <section class="layout">
        <div class="calendar-shell">
          <div class="weekdays" aria-hidden="true">
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
            <div class="weekday">日</div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <aside class="side-panel" aria-label="今日活动">
          <h2 class="panel-date" id="selectedDateTitle"></h2>
          <p class="panel-meta" id="selectedDateMeta"></p>

          <div class="section-title">已添加</div>
          <div class="selected-list" id="selectedActivities"></div>

          <div class="section-title">添加无氧运动</div>
          <div class="activity-list" id="strengthActivities"></div>

          <div class="section-title">添加有氧运动</div>
          <div class="activity-list" id="cardioActivities"></div>

          <div class="section-title">备注</div>
          <div class="note-row">
            <input class="note-input" id="noteInput" maxlength="36" placeholder="例如：强度不错 / 腿有点酸" />
            <button class="ghost-button" id="saveNote" type="button">保存</button>
          </div>
        </aside>
      </section>
    </main>

    <script>
      function bodyPartIcon(part) {
        const base = `
          <circle cx="24" cy="7.5" r="4.6" fill="none" stroke="#f4f4f4" stroke-width="3"/>
          <path d="M14.5 18c2.6-2.5 5.8-3.8 9.5-3.8s6.9 1.3 9.5 3.8" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
          <path d="M16.5 18.5v14.2c0 3.4 3.2 6.1 7.5 6.1s7.5-2.7 7.5-6.1V18.5" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
          <path d="M16.4 20.5 9.6 31.2" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
          <path d="M31.6 20.5 38.4 31.2" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
          <path d="M20.5 38.2 18.3 45" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
          <path d="M27.5 38.2 29.7 45" fill="none" stroke="#f4f4f4" stroke-width="3" stroke-linecap="round"/>
        `;
        const highlight = {
          chest: `
            <path d="M17.2 21.3c2-1.1 4.5-1.5 6.8-1.5s4.8.4 6.8 1.5" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
            <path d="M18.8 25.1c1.5.7 3.1 1.1 5.2 1.1s3.7-.4 5.2-1.1" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
          `,
          back: `
            <path d="M17.4 19.4c1.1 6.4 3.3 11.1 6.6 14.1" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
            <path d="M30.6 19.4c-1.1 6.4-3.3 11.1-6.6 14.1" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
            <path d="M24 16.3v18.8" fill="none" stroke="#f4f4f4" stroke-width="2.4" stroke-linecap="round"/>
          `,
          shoulder: `
            <circle cx="15.4" cy="18.5" r="3.9" fill="#ff6b6b"/>
            <circle cx="32.6" cy="18.5" r="3.9" fill="#ff6b6b"/>
          `,
          legs: `
            <path d="M20.4 38.1 18 45" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
            <path d="M27.6 38.1 30 45" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
            <path d="M21 32.8h6" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
          `,
          biceps: `
            <path d="M15.4 20.7 10.2 29.6" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
            <path d="M32.6 20.7 37.8 29.6" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
            <circle cx="10.2" cy="29.7" r="2.4" fill="#ff6b6b"/>
            <circle cx="37.8" cy="29.7" r="2.4" fill="#ff6b6b"/>
          `,
          triceps: `
            <path d="M17.8 19.3 13.7 27.9" fill="none" stroke="#ff6b6b" stroke-width="4.8" stroke-linecap="round"/>
            <path d="M30.2 19.3 34.3 27.9" fill="none" stroke="#ff6b6b" stroke-width="4.8" stroke-linecap="round"/>
            <path d="M12.4 30.5h5.2" fill="none" stroke="#ff6b6b" stroke-width="3.3" stroke-linecap="round"/>
            <path d="M30.4 30.5h5.2" fill="none" stroke="#ff6b6b" stroke-width="3.3" stroke-linecap="round"/>
          `,
        };

        return `<svg viewBox="0 0 48 48" aria-hidden="true">${base}${highlight[part]}</svg>`;
      }

      const activities = [
        { id: "chest", name: "胸", type: "无氧", group: "strength", icon: bodyPartIcon("chest") },
        { id: "back", name: "背", type: "无氧", group: "strength", icon: bodyPartIcon("back") },
        { id: "shoulder", name: "肩", type: "无氧", group: "strength", icon: bodyPartIcon("shoulder") },
        { id: "legs", name: "腿", type: "无氧", group: "strength", icon: bodyPartIcon("legs") },
        { id: "biceps", name: "二头", type: "无氧", group: "strength", icon: bodyPartIcon("biceps") },
        { id: "triceps", name: "三头", type: "无氧", group: "strength", icon: bodyPartIcon("triceps") },
        { id: "run", name: "跑步", type: "有氧", group: "cardio", icon: "🏃" },
        { id: "swim", name: "游泳", type: "有氧", group: "cardio", icon: "🏊" },
        { id: "badminton", name: "羽毛球", type: "有氧", group: "cardio", icon: "🏸" },
      ];

      const state = {
        cursor: new Date(),
        selected: new Date(),
        records: loadRecords(),
      };

      const calendarGrid = document.querySelector("#calendarGrid");
      const monthLabel = document.querySelector("#monthLabel");
      const selectedDateTitle = document.querySelector("#selectedDateTitle");
      const selectedDateMeta = document.querySelector("#selectedDateMeta");
      const selectedActivities = document.querySelector("#selectedActivities");
      const strengthActivities = document.querySelector("#strengthActivities");
      const cardioActivities = document.querySelector("#cardioActivities");
      const noteInput = document.querySelector("#noteInput");

      document.querySelector("#prevMonth").addEventListener("click", () => shiftMonth(-1));
      document.querySelector("#nextMonth").addEventListener("click", () => shiftMonth(1));
      document.querySelector("#todayButton").addEventListener("click", goToday);
      document.querySelector("#saveNote").addEventListener("click", saveNote);
      noteInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") saveNote();
      });

      render();

      function render() {
        renderCalendar();
        renderPanel();
        renderOptions();
      }

      function renderCalendar() {
        calendarGrid.innerHTML = "";
        monthLabel.textContent = `${state.cursor.getFullYear()}年 ${state.cursor.getMonth() + 1}月`;

        const year = state.cursor.getFullYear();
        const month = state.cursor.getMonth();
        const first = new Date(year, month, 1);
        const startOffset = (first.getDay() + 6) % 7;
        const start = new Date(year, month, 1 - startOffset);

        for (let index = 0; index < 42; index += 1) {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          const key = dateKey(date);
          const record = state.records[key] || { activities: [], note: "" };
          const dayButton = document.createElement("button");
          dayButton.type = "button";
          dayButton.className = [
            "day",
            date.getMonth() !== month ? "is-muted" : "",
            sameDay(date, state.selected) ? "is-selected" : "",
            sameDay(date, new Date()) ? "is-today" : "",
          ]
            .filter(Boolean)
            .join(" ");
          dayButton.setAttribute("aria-label", `${date.getMonth() + 1}月${date.getDate()}日`);
          dayButton.addEventListener("click", () => {
            state.selected = date;
            state.cursor = new Date(date.getFullYear(), date.getMonth(), 1);
            render();
          });

          const head = document.createElement("div");
          head.className = "date-head";
          head.innerHTML = `<span class="date-number">${date.getDate()}</span><span class="activity-count">${record.activities.length || ""}</span>`;

          const icons = document.createElement("div");
          icons.className = "day-icons";
          record.activities.slice(0, 5).forEach((id) => {
            const activity = findActivity(id);
            if (!activity) return;
            const icon = document.createElement("span");
            icon.className = "mini-icon";
            icon.title = activity.name;
            icon.innerHTML = activity.icon;
            icons.appendChild(icon);
          });

          dayButton.append(head, icons);
          calendarGrid.appendChild(dayButton);
        }
      }

      function renderPanel() {
        const key = dateKey(state.selected);
        const record = ensureRecord(key);
        selectedDateTitle.textContent = `${state.selected.getMonth() + 1}月${state.selected.getDate()}日`;
        selectedDateMeta.textContent = `${weekdayName(state.selected)} · ${record.activities.length} 项活动`;
        noteInput.value = record.note || "";

        selectedActivities.innerHTML = "";
        if (!record.activities.length && !record.note) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "这天还没有打卡";
          selectedActivities.appendChild(empty);
          return;
        }

        record.activities.forEach((id) => {
          const activity = findActivity(id);
          if (!activity) return;
          const item = document.createElement("div");
          item.className = "selected-item";
          item.innerHTML = `
            <span class="activity-icon">${activity.icon}</span>
            <span class="activity-name">${activity.name}</span>
          `;
          const remove = document.createElement("button");
          remove.className = "remove-button";
          remove.type = "button";
          remove.title = `移除${activity.name}`;
          remove.setAttribute("aria-label", `移除${activity.name}`);
          remove.textContent = "×";
          remove.addEventListener("click", () => removeActivity(id));
          item.appendChild(remove);
          selectedActivities.appendChild(item);
        });

        if (record.note) {
          const note = document.createElement("div");
          note.className = "empty";
          note.textContent = record.note;
          selectedActivities.appendChild(note);
        }
      }

      function renderOptions() {
        strengthActivities.innerHTML = "";
        cardioActivities.innerHTML = "";
        activities.forEach((activity) => {
          const button = document.createElement("button");
          const selectedIds = ensureRecord(dateKey(state.selected)).activities;
          const added = selectedIds.includes(activity.id);
          button.type = "button";
          button.className = `activity-option ${added ? "is-added" : ""}`;
          button.innerHTML = `
            <span class="activity-icon">${activity.icon}</span>
            <span>
              <span class="activity-name">${activity.name}</span>
              <span class="activity-type">${activity.type}运动</span>
            </span>
            <span class="tag ${activity.group}">${added ? "已选" : activity.type}</span>
          `;
          button.addEventListener("click", () => toggleActivity(activity.id));
          const target = activity.group === "strength" ? strengthActivities : cardioActivities;
          target.appendChild(button);
        });
      }

      function toggleActivity(id) {
        const key = dateKey(state.selected);
        const record = ensureRecord(key);
        record.activities = record.activities.includes(id)
          ? record.activities.filter((item) => item !== id)
          : [...record.activities, id];
        persist();
        render();
      }

      function removeActivity(id) {
        const key = dateKey(state.selected);
        const record = ensureRecord(key);
        record.activities = record.activities.filter((item) => item !== id);
        persist();
        render();
      }

      function saveNote() {
        const key = dateKey(state.selected);
        ensureRecord(key).note = noteInput.value.trim();
        persist();
        render();
      }

      function shiftMonth(step) {
        state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + step, 1);
        state.selected = new Date(state.cursor);
        render();
      }

      function goToday() {
        state.cursor = new Date();
        state.selected = new Date();
        render();
      }

      function ensureRecord(key) {
        if (!state.records[key]) {
          state.records[key] = { activities: [], note: "" };
        }
        return state.records[key];
      }

      function findActivity(id) {
        return activities.find((activity) => activity.id === id);
      }

      function dateKey(date) {
        const year = date.getFullYear();
        const month = `${date.getMonth() + 1}`.padStart(2, "0");
        const day = `${date.getDate()}`.padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function sameDay(a, b) {
        return dateKey(a) === dateKey(b);
      }

      function weekdayName(date) {
        return ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][date.getDay()];
      }

      function loadRecords() {
        try {
          return JSON.parse(localStorage.getItem("fitness-calendar-records")) || {};
        } catch {
          return {};
        }
      }

      function persist() {
        localStorage.setItem("fitness-calendar-records", JSON.stringify(state.records));
      }

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
